# .github/workflows/image-scan.yml
#
# Trivy image scan for backend and frontend Docker images. Runs after
# the CI build (or directly on main pushes). Fails the build on
# CRITICAL or HIGH vulnerabilities with a known fix. Tolerates
# MEDIUM and LOW.
#
# Uses aquasecurity/trivy-action which caches the vuln DB between
# runs to keep CI fast.

name: Image Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  scan:
    name: Trivy scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        service: [backend, frontend]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t indigopay-${{ matrix.service }}:scan \
            ./${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        # Tag-pinned for clarity. Before this workflow is used in
        # production, replace the tag with a commit SHA for supply-chain
        # hygiene. The previous attempt used a fabricated SHA which
        # would have broken CI on first run.
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: indigopay-${{ matrix.service }}:scan
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
